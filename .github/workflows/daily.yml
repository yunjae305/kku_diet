name: Daily Diet Notification

on:
  schedule:
    # UTC 23:00 = KST 08:00 (매일, 모시래학사는 주말에도 운영)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_HAEOREUM: ${{ secrets.DISCORD_WEBHOOK_HAEOREUM }}
          DISCORD_WEBHOOK_MOSIRAE: ${{ secrets.DISCORD_WEBHOOK_MOSIRAE }}
        run: python notify.py
