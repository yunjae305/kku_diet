name: Daily Diet Notification

on:
  schedule:
    - cron: '25 22 * * *'  # KST 07:25 → 수신 목표 08:00
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_HAEOREUM: ${{ secrets.DISCORD_WEBHOOK_HAEOREUM }}
          DISCORD_WEBHOOK_MOSIRAE: ${{ secrets.DISCORD_WEBHOOK_MOSIRAE }}
        run: python notify.py
